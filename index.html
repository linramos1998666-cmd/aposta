<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analista de Apostas Pro</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  margin: 0;
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid #22c55e;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #020617;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(34,197,94,0.2);
  margin-bottom: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  width: 150px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 12px 20px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #16a34a;
}

.resultado {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-left: 4px solid #22c55e;
}

.alta { color: #22c55e; }
.media { color: #facc15; }
.baixa { color: #ef4444; }

h2 { margin-top: 0; }
</style>
</head>

<body>

<header>
  <h1>⚽ Analista de Apostas PRO</h1>
</header>

<div class="container">

<div class="card">
  <h2>📊 Dados do Jogo</h2>

  <input id="timeA" placeholder="Time A">
  <input id="timeB" placeholder="Time B"><br>

  <input id="golsA" type="number" placeholder="Média gols A">
  <input id="golsB" type="number" placeholder="Média gols B"><br>

  <input id="sofreA" type="number" placeholder="Gols sofridos A">
  <input id="sofreB" type="number" placeholder="Gols sofridos B"><br>

  <input id="formaA" type="number" placeholder="Forma A (0-5)">
  <input id="formaB" type="number" placeholder="Forma B (0-5)"><br><br>

  <button onclick="analisar()">🔥 Analisar Jogo</button>
</div>

<div class="card resultado" id="saida">
  Resultado aparecerá aqui...
</div>

</div>

<script>
function analisar() {

  let golsA = parseFloat(document.getElementById("golsA").value);
  let golsB = parseFloat(document.getElementById("golsB").value);
  let sofreA = parseFloat(document.getElementById("sofreA").value);
  let sofreB = parseFloat(document.getElementById("sofreB").value);
  let formaA = parseFloat(document.getElementById("formaA").value);
  let formaB = parseFloat(document.getElementById("formaB").value);

  let ataqueA = golsA - sofreA;
  let ataqueB = golsB - sofreB;

  let probA = (ataqueA + formaA) * 10;
  let probB = (ataqueB + formaB) * 10;

  let totalGols = golsA + golsB;

  let resultado = "";
  let confianca = "";
  let sugestao = "";

  // RESULTADO
  if (probA > probB) {
    resultado = "🏆 Favorito: Time A";
  } else if (probB > probA) {
    resultado = "🏆 Favorito: Time B";
  } else {
    resultado = "⚖️ Jogo equilibrado";
  }

  // OVER / UNDER
  if (totalGols >= 2.5) {
    sugestao = "🔥 Sugestão: OVER 2.5 gols";
  } else {
    sugestao = "⚠️ Sugestão: UNDER 2.5 gols";
  }

  // AMBAS MARCAM
  if (golsA > 1 && golsB > 1) {
    sugestao += "<br>⚽ Ambas marcam: SIM";
  } else {
    sugestao += "<br>⚽ Ambas marcam: NÃO";
  }

  // CONFIANÇA
  let diff = Math.abs(probA - probB);

  if (diff > 15) {
    confianca = "<span class='alta'>🔥 Alta</span>";
  } else if (diff > 7) {
    confianca = "<span class='media'>⚠️ Média</span>";
  } else {
    confianca = "<span class='baixa'>❌ Baixa</span>";
  }

  document.getElementById("saida").innerHTML = `
    <h2>📈 Análise do Jogo</h2>
    ${resultado}<br><br>
    ${sugestao}<br><br>
    🎯 Nível de Confiança: ${confianca}
  `;
}
</script>

</body>
</html>
