<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analista PRO REAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#020617; color:#fff;}
header { padding:20px; text-align:center; border-bottom:2px solid #22c55e;}
.container { max-width:1300px; margin:auto; padding:20px;}
.grid { display:grid; grid-template-columns:1fr 2fr; gap:20px;}
.card { background:#0f172a; padding:20px; border-radius:12px;}
.jogo { padding:10px; border-bottom:1px solid #1e293b; cursor:pointer;}
.jogo:hover { background:#1e293b;}
.resultado { background:#020617; border:1px solid #22c55e; padding:15px; border-radius:10px;}
button { padding:10px; width:100%; background:#22c55e; border:none; border-radius:6px; margin-bottom:10px; cursor:pointer;}
</style>
</head>

<body>

<header>
<h1>⚽ ANALISTA PRO REAL</h1>
<p style="color:#22c55e;">IA com Odds Reais</p>
</header>

<div class="container">
<div class="grid">

<div class="card">
<h2>🔥 Jogos + Odds</h2>
<button onclick="carregarJogos()">Atualizar</button>
<div id="jogos"></div>
</div>

<div class="card">
<h2>📊 Análise Profissional</h2>
<div id="saida" class="resultado">Clique em um jogo</div>
<canvas id="grafico"></canvas>
</div>

</div>
</div>

<script>
let chart;

// ================= API ODDS =================
async function carregarJogos() {

  const apiKey = "SUA_API_KEY_AQUI";

  const url = `https://api.the-odds-api.com/v4/sports/soccer/odds/?regions=eu&markets=h2h&apiKey=${apiKey}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    let html = "";

    data.slice(0,10).forEach(jogo => {

      let timeA = jogo.home_team;
      let timeB = jogo.away_team;

      let odds = jogo.bookmakers[0].markets[0].outcomes;

      let oddA = odds.find(o=>o.name===timeA)?.price || 2;
      let oddB = odds.find(o=>o.name===timeB)?.price || 2;

      html += `
        <div class="jogo" onclick="analisar('${timeA}','${timeB}',${oddA},${oddB})">
          ⚽ ${timeA} vs ${timeB}<br>
          💰 ${oddA} | ${oddB}
        </div>
      `;
    });

    document.getElementById("jogos").innerHTML = html;

  } catch {
    document.getElementById("jogos").innerHTML = "Erro na API ❌";
  }
}

// ================= IA REAL =================
function analisar(timeA,timeB,oddA,oddB){

  // Probabilidade baseada em odds
  let probA = (1/oddA) * 100;
  let probB = (1/oddB) * 100;

  let total = probA + probB;

  probA = (probA/total)*100;
  probB = (probB/total)*100;

  // VALUE BET
  let valorA = probA/100 * oddA;
  let valorB = probB/100 * oddB;

  let value = valorA > 1 ? timeA : valorB > 1 ? timeB : "Nenhum";

  // IA decisão
  let sugestao = "";

  if(probA > 60){
    sugestao = "🔥 Apostar em " + timeA;
  } else if(probB > 60){
    sugestao = "🔥 Apostar em " + timeB;
  } else {
    sugestao = "⚠️ Jogo arriscado";
  }

  document.getElementById("saida").innerHTML = `
<b>${timeA} vs ${timeB}</b><br><br>

📊 Probabilidades reais:<br>
${timeA}: ${probA.toFixed(1)}%<br>
${timeB}: ${probB.toFixed(1)}%<br><br>

💰 Odds:<br>
${oddA} | ${oddB}<br><br>

💎 Value Bet: <b style="color:#22c55e">${value}</b><br><br>

🧠 IA: ${sugestao}
`;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: 'bar',
    data: {
      labels: [timeA,timeB],
      datasets: [{
        label: 'Probabilidade (%)',
        data: [probA,probB]
      }]
    }
  });
}
</script>

</body>
</html>
