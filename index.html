<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analista PRO VIP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#020617; color:#fff;}

header {
  padding:20px;
  text-align:center;
  border-bottom:2px solid #22c55e;
}

.container {
  max-width:1300px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:20px;
}

.card {
  background:#0f172a;
  padding:20px;
  border-radius:12px;
}

.jogo {
  padding:12px;
  border-left:4px solid #22c55e;
  margin-bottom:10px;
  border-radius:6px;
  cursor:pointer;
  background:#020617;
}

.jogo:hover {
  background:#1e293b;
}

.resultado {
  background:#020617;
  border:1px solid #22c55e;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

button {
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:6px;
  margin-bottom:10px;
  cursor:pointer;
  font-weight:bold;
}

.vip-box {
  margin-top:15px;
  padding:15px;
  background:#111827;
  border-radius:8px;
  text-align:center;
}

.value {
  color:#22c55e;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>⚽ ANALISTA PRO VIP</h1>
<p style="color:#22c55e;">IA com Odds Reais</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h2>🔥 Jogos + Odds</h2>

<button onclick="carregarJogos()">Atualizar Jogos</button>

<div id="jogos">Clique para carregar jogos...</div>
</div>

<div class="card">
<h2>📊 Análise Profissional</h2>

<div id="saida" class="resultado">
Clique em um jogo para analisar
</div>

<canvas id="grafico"></canvas>

<div class="vip-box">
🔒 Acesso VIP desbloqueia análises completas<br><br>
<button onclick="alert('Área VIP em breve 💰')">Entrar no VIP</button>
</div>

</div>

</div>

</div>

<script>
let chart;

// ================= API =================
async function carregarJogos() {

  document.getElementById("jogos").innerHTML = "⏳ Carregando jogos...";

  try {
    const res = await fetch("/api/odds");
    const data = await res.json();

    let html = "";

    data.slice(0,10).forEach(jogo => {

      let timeA = jogo.home_team;
      let timeB = jogo.away_team;

      let oddA = 2;
      let oddB = 2;

      if (jogo.bookmakers && jogo.bookmakers.length > 0) {

        let market = jogo.bookmakers[0].markets.find(m => m.key === "h2h");

        if (market) {
          let outcomes = market.outcomes;

          oddA = outcomes.find(o => o.name === timeA)?.price || 2;
          oddB = outcomes.find(o => o.name === timeB)?.price || 2;
        }
      }

      html += `
        <div class="jogo" onclick="analisar('${timeA}','${timeB}',${oddA},${oddB})">
          ⚽ ${timeA} vs ${timeB}<br>
          <div style="color:#22c55e; font-size:12px;">HOJE</div>
          💰 ${oddA} | ${oddB}
        </div>
      `;
    });

    document.getElementById("jogos").innerHTML = html;

  } catch {
    document.getElementById("jogos").innerHTML = "Erro ao carregar API ❌";
  }
}

// ================= IA =================
function analisar(timeA,timeB,oddA,oddB){

  let probA = (1/oddA) * 100;
  let probB = (1/oddB) * 100;

  let total = probA + probB;

  probA = (probA/total)*100;
  probB = (probB/total)*100;

  let valorA = probA/100 * oddA;
  let valorB = probB/100 * oddB;

  let value = valorA > 1 ? timeA : valorB > 1 ? timeB : "Nenhum";

  let vantagem = Math.abs(probA - probB);

  let classificacao =
    vantagem > 25 ? "🔥 APOSTA FORTE" :
    vantagem > 15 ? "⚠️ BOA OPORTUNIDADE" :
    "❌ EVITAR";

  let sugestao = vantagem > 20
    ? "Entrada com alto potencial"
    : "Risco elevado";

  document.getElementById("saida").innerHTML = `
<b>${timeA} vs ${timeB}</b><br><br>

📊 ${timeA}: ${probA.toFixed(1)}%<br>
📊 ${timeB}: ${probB.toFixed(1)}%<br><br>

💰 Odds: ${oddA} | ${oddB}<br><br>

💎 Value Bet: <span class="value">${value}</span><br><br>

🏆 Classificação: ${classificacao}<br><br>

🧠 IA: ${sugestao}
`;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: 'bar',
    data: {
      labels: [timeA,timeB],
      datasets: [{
        label: 'Probabilidade (%)',
        data: [probA,probB]
      }]
    }
  });
}
</script>

</body>
</html>
