<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analista PRO VIP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: #fff;
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid #22c55e;
}

header p {
  color: #22c55e;
  margin-top: 5px;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(34,197,94,0.2);
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.resultado {
  margin-top: 20px;
  background: #020617;
  border: 1px solid #22c55e;
  border-radius: 10px;
  padding: 15px;
}

.alta { color: #22c55e; }
.media { color: #facc15; }
.baixa { color: #ef4444; }

/* RESPONSIVO */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>⚽ ANALISTA PRO VIP</h1>
  <p>Sistema avançado de análise esportiva</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h2>📊 Dados</h2>

<input id="timeA" placeholder="Time A">
<input id="timeB" placeholder="Time B">

<input id="golsA" type="number" placeholder="Média gols A">
<input id="golsB" type="number" placeholder="Média gols B">

<input id="sofreA" type="number" placeholder="Sofre gols A">
<input id="sofreB" type="number" placeholder="Sofre gols B">

<input id="formaA" type="number" placeholder="Forma A (0-5)">
<input id="formaB" type="number" placeholder="Forma B (0-5)">

<input id="oddA" type="number" placeholder="Odd Time A">
<input id="oddB" type="number" placeholder="Odd Time B">

<button onclick="analisar()">🔥 Analisar</button>

<div class="resultado" id="saida"></div>

</div>

<div class="card">
<h2>📈 Probabilidade</h2>
<canvas id="grafico"></canvas>
</div>

</div>

</div>

<script>
let chart;

function analisar() {

let timeA = document.getElementById("timeA").value || "Time A";
let timeB = document.getElementById("timeB").value || "Time B";

let golsA = +document.getElementById("golsA").value || 0;
let golsB = +document.getElementById("golsB").value || 0;
let sofreA = +document.getElementById("sofreA").value || 0;
let sofreB = +document.getElementById("sofreB").value || 0;
let formaA = +document.getElementById("formaA").value || 0;
let formaB = +document.getElementById("formaB").value || 0;
let oddA = +document.getElementById("oddA").value || 1;
let oddB = +document.getElementById("oddB").value || 1;

let ataqueA = golsA - sofreA;
let ataqueB = golsB - sofreB;

let probA = (ataqueA + formaA + 1) * 15;
let probB = (ataqueB + formaB + 1) * 15;

let total = probA + probB;

probA = (probA / total) * 100;
probB = (probB / total) * 100;

let diff = Math.abs(probA - probB);

let nivel = diff > 20 ? "<span class='alta'>🔥 Alta</span>" :
             diff > 10 ? "<span class='media'>⚠️ Média</span>" :
                         "<span class='baixa'>❌ Baixa</span>";

let valorA = (probA/100) * oddA;
let valorB = (probB/100) * oddB;

let valueBet = valorA > 1 ? timeA : valorB > 1 ? timeB : "Nenhum";

let analiseTexto = "";

if(probA > probB){
  analiseTexto = `${timeA} apresenta melhor desempenho ofensivo e maior consistência recente.`;
}else if(probB > probA){
  analiseTexto = `${timeB} chega mais forte com base nos dados e forma atual.`;
}else{
  analiseTexto = `Jogo equilibrado, sem vantagem clara.`;
}

document.getElementById("saida").innerHTML = `
🏆 Favorito: <b>${probA > probB ? timeA : timeB}</b><br><br>

📊 ${timeA}: ${probA.toFixed(1)}%<br>
📊 ${timeB}: ${probB.toFixed(1)}%<br><br>

💰 Value Bet: <b style="color:#22c55e">${valueBet}</b><br>
🎯 Confiança: ${nivel}<br><br>

🧠 Análise: ${analiseTexto}
`;

if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"), {
type: 'bar',
data: {
labels: [timeA, timeB],
datasets: [{
label: 'Probabilidade (%)',
data: [probA, probB]
}]
}
});

}
</script>

</body>
</html>
