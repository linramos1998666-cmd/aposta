<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analista PRO V2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: #fff;
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid #22c55e;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(34,197,94,0.2);
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.resultado {
  margin-top: 20px;
}

.alta { color: #22c55e; }
.media { color: #facc15; }
.baixa { color: #ef4444; }
</style>
</head>

<body>

<header>
<h1>⚽ Analista PRO V2</h1>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h2>📊 Dados</h2>

<input id="timeA" placeholder="Time A">
<input id="timeB" placeholder="Time B">

<input id="golsA" type="number" placeholder="Média gols A">
<input id="golsB" type="number" placeholder="Média gols B">

<input id="sofreA" type="number" placeholder="Sofre gols A">
<input id="sofreB" type="number" placeholder="Sofre gols B">

<input id="formaA" type="number" placeholder="Forma A (0-5)">
<input id="formaB" type="number" placeholder="Forma B (0-5)">

<input id="oddA" type="number" placeholder="Odd Time A">
<input id="oddB" type="number" placeholder="Odd Time B">

<button onclick="analisar()">🔥 Analisar</button>

<div class="resultado" id="saida"></div>

</div>

<div class="card">
<h2>📈 Probabilidade</h2>
<canvas id="grafico"></canvas>
</div>

</div>

</div>

<script>
let chart;

function analisar() {

let golsA = +golsAEl.value;
let golsB = +golsBEl.value;
let sofreA = +sofreAEl.value;
let sofreB = +sofreBEl.value;
let formaA = +formaAEl.value;
let formaB = +formaBEl.value;
let oddA = +oddAEl.value;
let oddB = +oddBEl.value;

let ataqueA = golsA - sofreA;
let ataqueB = golsB - sofreB;

let probA = (ataqueA + formaA + 1) * 15;
let probB = (ataqueB + formaB + 1) * 15;

let total = probA + probB;

probA = (probA / total) * 100;
probB = (probB / total) * 100;

let confianca = Math.abs(probA - probB);

let nivel = confianca > 20 ? "Alta" : confianca > 10 ? "Média" : "Baixa";

let valorA = (probA/100) * oddA;
let valorB = (probB/100) * oddB;

let valueBet = valorA > 1 ? "Time A" : valorB > 1 ? "Time B" : "Nenhum";

document.getElementById("saida").innerHTML = `
🏆 Favorito: ${probA > probB ? "Time A" : "Time B"}<br><br>
📊 Prob A: ${probA.toFixed(1)}%<br>
📊 Prob B: ${probB.toFixed(1)}%<br><br>

💰 Value Bet: ${valueBet}<br>
🎯 Confiança: ${nivel}
`;

if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"), {
type: 'bar',
data: {
labels: ['Time A', 'Time B'],
datasets: [{
label: 'Probabilidade (%)',
data: [probA, probB]
}]
}
});

}
</script>

</body>
</html>
