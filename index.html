<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analista PRO VIP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid #22c55e;
}

.container {
  max-width: 1300px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
}

.jogo {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  cursor: pointer;
}

.jogo:hover {
  background: #1e293b;
}

.resultado {
  background: #020617;
  border: 1px solid #22c55e;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  width: 100%;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  margin-bottom: 10px;
  cursor: pointer;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
<h1>⚽ ANALISTA PRO VIP</h1>
<p style="color:#22c55e;">Dashboard inteligente de apostas</p>
</header>

<div class="container">

<div class="grid">

<!-- LISTA DE JOGOS -->
<div class="card">
<h2>🔥 Jogos</h2>
<button onclick="carregarJogos()">Atualizar Jogos</button>
<div id="jogos"></div>
</div>

<!-- ANALISE -->
<div class="card">
<h2>📊 Análise Inteligente</h2>
<div id="saida" class="resultado">Clique em um jogo para analisar</div>
<canvas id="grafico"></canvas>
</div>

</div>

</div>

<script>
let chart;

// ================= API =================
async function carregarJogos() {
  try {
    const response = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2026-03-22&s=Soccer");
    const data = await response.json();

    let html = "";

    data.events.slice(0,15).forEach(jogo => {
      let a = jogo.strHomeTeam;
      let b = jogo.strAwayTeam;

      html += `
        <div class="jogo" onclick="analisarJogo('${a}','${b}')">
          ⚽ ${a} vs ${b}
        </div>
      `;
    });

    document.getElementById("jogos").innerHTML = html;

  } catch {
    document.getElementById("jogos").innerHTML = "Erro ao carregar";
  }
}

// ================= IA MELHORADA =================
function analisarJogo(timeA, timeB) {

  // simulação inteligente (pode evoluir depois)
  let ataqueA = Math.random() * 2 + 1;
  let ataqueB = Math.random() * 2 + 1;

  let defesaA = Math.random() * 2;
  let defesaB = Math.random() * 2;

  let formaA = Math.random() * 5;
  let formaB = Math.random() * 5;

  let scoreA = ataqueA - defesaB + formaA;
  let scoreB = ataqueB - defesaA + formaB;

  let probA = (scoreA / (scoreA + scoreB)) * 100;
  let probB = 100 - probA;

  let totalGols = ataqueA + ataqueB;

  // IA DE APOSTA
  let sugestao = "";

  if(totalGols > 2.5){
    sugestao += "🔥 Over 2.5 gols<br>";
  } else {
    sugestao += "⚠️ Under 2.5 gols<br>";
  }

  if(probA > 60){
    sugestao += "🏆 Vitória provável: " + timeA;
  } else if(probB > 60){
    sugestao += "🏆 Vitória provável: " + timeB;
  } else {
    sugestao += "⚖️ Jogo equilibrado";
  }

  let confianca = Math.abs(probA - probB);
  let nivel = confianca > 25 ? "🔥 ALTA" :
              confianca > 10 ? "⚠️ MÉDIA" : "❌ BAIXA";

  document.getElementById("saida").innerHTML = `
<b>${timeA} vs ${timeB}</b><br><br>

📊 ${timeA}: ${probA.toFixed(1)}%<br>
📊 ${timeB}: ${probB.toFixed(1)}%<br><br>

🎯 Confiança: ${nivel}<br><br>

💡 Sugestão:<br>${sugestao}
`;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: 'bar',
    data: {
      labels: [timeA, timeB],
      datasets: [{
        label: 'Probabilidade',
        data: [probA, probB]
      }]
    }
  });
}
</script>

</body>
</html>
